command:
  - "node"
  - "app.js"
env:
  # DATABRICKS_HOST and DATABRICKS_TOKEN are injected automatically by Databricks Apps.
  # DATABRICKS_TOKEN is also used directly as the Lakebase password (Autoscaling model).
  # For Provisioned instances, set LAKEBASE_INSTANCE_NAME to enable credential generation.
  - name: DATABRICKS_USER
    value: "your-email@example.com"
  - name: LAKEBASE_HOST
    value: "your-project.database.region.azuredatabricks.net"
  - name: LAKEBASE_DB
    value: "databricks_postgres"
  - name: LAKEBASE_SCHEMA
    value: "datamarket"
  # Uncomment for Provisioned (non-Autoscaling) Lakebase instances:
  # - name: LAKEBASE_INSTANCE_NAME
  #   value: "your-instance-name"
  # ── Branding ─────────────────────────────────────────────────────────────
  # Customize the portal name, tagline, and logo for your organization.
  # Leave APP_LOGO_URL blank ("") to hide the logo entirely.
  - name: APP_NAME
    value: "DataMarket"
  - name: APP_SUBTITLE
    value: "Data Discovery & Access"
  - name: APP_LOGO_URL
    value: ""
  # ── Deployment Mode ──────────────────────────────────────────────────────
  # "true" = persona switcher, no real UC grants (default for demos)
  # "false" = SSO identity, real UC grants via SQL Statement Execution API
  - name: DEMO_MODE
    value: "true"
  # ── Unity Catalog Integration ────────────────────────────────────────────
  # Uncomment to enable real GRANT/REVOKE + live column schema discovery
  # - name: SQL_WAREHOUSE_ID
  #   value: "your-warehouse-id"
  # ── Request for Access (RFA) ─────────────────────────────────────────────
  # Uncomment to fire UC RFA notifications on access request submit
  # - name: RFA_ENABLED
  #   value: "true"
