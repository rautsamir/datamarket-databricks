command:
  - "node"
  - "app.js"
env:
  # DATABRICKS_HOST and DATABRICKS_TOKEN are injected automatically by Databricks Apps — do not set manually.
  - name: DATABRICKS_USER
    value: "your-email@example.com"
  - name: LAKEBASE_HOST
    value: "your-instance.database.azuredatabricks.net"
  - name: LAKEBASE_INSTANCE
    value: "your-lakebase-instance-name"
  - name: LAKEBASE_DB
    value: "databricks_postgres"
  - name: LAKEBASE_SCHEMA
    value: "datamarket"
