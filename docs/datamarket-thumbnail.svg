<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.98"/>
      <stop offset="100%" style="stop-color:#f5f7fa;stop-opacity:1"/>
    </linearGradient>
    <filter id="cardShadow" x="-4%" y="-2%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.12"/>
    </filter>
    <filter id="softGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#FF3621" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="#003865"/>
  
  <!-- Subtle grid pattern overlay -->
  <g opacity="0.06">
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="white" stroke-width="0.5"/>
    </pattern>
    <rect width="1200" height="630" fill="url(#grid)"/>
  </g>
  
  <!-- DataMarket wordmark + icon -->
  <g transform="translate(48, 36)">
    <!-- Grid/database icon -->
    <g fill="#FF3621">
      <rect x="0" y="4" width="10" height="10" rx="2"/>
      <rect x="14" y="4" width="10" height="10" rx="2"/>
      <rect x="0" y="18" width="10" height="10" rx="2"/>
      <rect x="14" y="18" width="10" height="10" rx="2"/>
    </g>
    <text x="32" y="26" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="white">DataMarket</text>
    <text x="48" y="52" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#94a3b8">Self-Service Data Product Marketplace &#183; Powered by Databricks</text>
  </g>
  
  <!-- Main area: 3 data product cards -->
  <g transform="translate(48, 88)">
    <!-- Card 1: Vendor Analytics -->
    <g filter="url(#cardShadow)" transform="translate(0, 0)">
      <rect width="348" height="220" x="0" y="0" rx="12" fill="url(#cardGrad)"/>
      <rect width="348" height="220" x="0" y="0" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="20" y="20" width="72" height="24" rx="12" fill="#FF3621" opacity="0.12"/>
      <text x="36" y="36" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#FF3621">Procurement</text>
      <text x="20" y="70" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Vendor Analytics</text>
      <text x="20" y="94" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">245K rows &#183; Daily refresh</text>
    </g>
    
    <!-- Card 2: Budget & Finance -->
    <g filter="url(#cardShadow)" transform="translate(372, 0)">
      <rect width="348" height="220" x="0" y="0" rx="12" fill="url(#cardGrad)"/>
      <rect width="348" height="220" x="0" y="0" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="20" y="20" width="62" height="24" rx="12" fill="#0ea5e9" opacity="0.15"/>
      <text x="36" y="36" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#0284c7">Finance</text>
      <text x="20" y="70" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Budget &amp; Finance</text>
      <text x="20" y="94" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">AI/BI Dashboard &#183; Live</text>
    </g>
    
    <!-- Card 3: Employee Metrics -->
    <g filter="url(#cardShadow)" transform="translate(744, 0)">
      <rect width="348" height="220" x="0" y="0" rx="12" fill="url(#cardGrad)"/>
      <rect width="348" height="220" x="0" y="0" rx="12" fill="none" stroke="#e2e8f0" stroke-width="1"/>
      <rect x="20" y="20" width="44" height="24" rx="12" fill="#22c55e" opacity="0.15"/>
      <text x="36" y="36" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#16a34a">HR</text>
      <text x="20" y="70" font-family="system-ui, sans-serif" font-size="18" font-weight="600" fill="#0f172a">Employee Metrics</text>
      <text x="20" y="94" font-family="system-ui, sans-serif" font-size="13" fill="#64748b">98K rows &#183; Weekly refresh</text>
    </g>
  </g>
  
  <!-- Bottom strip: feature badges -->
  <g transform="translate(48, 340)">
    <rect x="0" y="0" width="80" height="28" rx="6" fill="rgba(255,255,255,0.12)"/>
    <text x="40" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Unity Catalog RBAC</text>
    
    <rect x="96" y="0" width="100" height="28" rx="6" fill="rgba(255,255,255,0.12)"/>
    <text x="146" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Genie AI Explorer</text>
    
    <rect x="212" y="0" width="100" height="28" rx="6" fill="rgba(255,255,255,0.12)"/>
    <text x="262" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Lakebase Approvals</text>
    
    <rect x="328" y="0" width="120" height="28" rx="6" fill="rgba(255,255,255,0.12)"/>
    <text x="388" y="19" font-family="system-ui, sans-serif" font-size="11" font-weight="500" fill="white" text-anchor="middle">Knowledge Assistant</text>
  </g>
  
  <!-- Built on Databricks - bottom right -->
  <g transform="translate(900, 550)">
    <text x="0" y="0" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">Built on</text>
    <text x="0" y="20" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#FF3621">Databricks</text>
  </g>
  
  <!-- Databricks logo placeholder (simplified triangle/star) -->
  <g transform="translate(1050, 558)" fill="#FF3621">
    <path d="M6 0 L12 10 L0 10 Z"/>
  </g>
</svg>
