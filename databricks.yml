bundle:
  name: datamarket

# ── Variables ─────────────────────────────────────────────────────────────────
# Override per target or pass on the CLI: --var admin_email=you@company.com
variables:
  admin_email:
    description: "Deployer email — auto-promoted to admin on first SSO login"

  demo_mode:
    description: "true = persona switcher (demos/POCs), false = real SSO + UC grants"
    default: "false"

  lakebase_project:
    description: "Lakebase Autoscaling project name (used as project_id)"
    default: "datamarket"

  app_name:
    description: "Databricks App name (must be unique per workspace)"
    default: "datamarket"

  lakebase_min_cu:
    description: "Lakebase autoscaling minimum compute units"
    default: "0.5"

  lakebase_max_cu:
    description: "Lakebase autoscaling maximum compute units"
    default: "2"

# ── Resources ─────────────────────────────────────────────────────────────────
resources:

  # ── Lakebase ──────────────────────────────────────────────────────────────
  # Requires Databricks CLI >= 0.287.0
  postgres_projects:
    datamarket_db:
      project_id: ${var.lakebase_project}
      display_name: "DataMarket — Lakebase"
      pg_version: 17
      enable_pg_native_login: false

  postgres_branches:
    production:
      parent: ${resources.postgres_projects.datamarket_db.id}
      branch_id: "production"
      no_expiry: true

  postgres_endpoints:
    primary:
      parent: ${resources.postgres_branches.production.id}
      endpoint_id: "primary"
      endpoint_type: "ENDPOINT_TYPE_READ_WRITE"
      autoscaling_limit_min_cu: ${var.lakebase_min_cu}
      autoscaling_limit_max_cu: ${var.lakebase_max_cu}

  # ── Databricks App ────────────────────────────────────────────────────────
  # app.yaml (in src/app/) is generated by deploy.sh — NOT committed to the repo.
  # Copy src/app/app.yaml.example → src/app/app.yaml and fill in values before
  # running `databricks bundle deploy`.
  apps:
    datamarket_app:
      name: ${var.app_name}
      description: "DataMarket — Self-Service Data Product Marketplace on Databricks"
      source_code_path: ./src/app

# ── Targets ───────────────────────────────────────────────────────────────────
targets:
  dev:
    default: true
    mode: development
    variables:
      app_name: "datamarket-dev"
      lakebase_project: "datamarket-dev"
      lakebase_min_cu: "0.5"
      lakebase_max_cu: "1"

  prod:
    mode: production
    variables:
      app_name: "datamarket"
      lakebase_project: "datamarket"
      lakebase_min_cu: "0.5"
      lakebase_max_cu: "4"
