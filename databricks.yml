bundle:
  name: datamarket

targets:
  dev:
    default: true
    workspace:
      host: ${DATABRICKS_HOST}
    resources:
      jobs:
        datamarket_job:
          name: datamarket_job
          tasks:
            - task_key: generate_data
              spark_python_task:
                python_file: ./src/datamarket/main.py
              environment_key: default
          environments:
            - environment_key: default
              spec:
                client: '1'
                dependencies: []
      apps:
        datamarket_app:
          name: datamarket
          description: "DataMarket — Self-Service Data Product Marketplace on Databricks"
          source_code_path: ./src/app
