bundle:
  name: lac_dna_portal

targets:
  dev:
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
    resources:
      jobs:
        lac_dna_portal_job:
          name: lac_dna_portal_job
          tasks:
            - task_key: generate_data
              spark_python_task:
                                   python_file: ./src/lac_dna_portal/main.py
              environment_key: default
          environments:
            - environment_key: default
              spec:
                client: '1'
                dependencies: []
      apps:
        lac_dna_portal_app:
          name: lac_dna_portal-dashboard
          description: "lac_dna_portal Analytics Dashboard"
          source_code_path: ./src/app
 